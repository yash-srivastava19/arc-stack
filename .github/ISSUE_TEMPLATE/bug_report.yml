name: Bug report
description: Report a reproducible arc bug
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or repo shape that reproduces the issue.
      placeholder: |
        arc init --base main
        arc new ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `arc doctor` if possible and paste the relevant output.
      render: text
    validations:
      required: false

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check arc/ tests/
      - name: Ruff format
        run: uv run ruff format --check arc/ tests/
      - name: Mypy
        run: uv run mypy arc/

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run tests with coverage
        run: uv run pytest --tb=short -q --cov=arc --cov-fail-under=80 --cov-report=xml

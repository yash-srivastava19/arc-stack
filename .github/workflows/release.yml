name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0) — must match version in pyproject.toml"
        required: true

jobs:
  release:
    name: Build, tag, and publish
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write       # create tags and GitHub releases
      id-token: write       # PyPI trusted publishing (no API token needed)
      pull-requests: write  # open the CHANGELOG PR
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Validate version matches pyproject.toml
        run: |
          ACTUAL=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$ACTUAL" != "${{ inputs.version }}" ]; then
            echo "Version mismatch: pyproject.toml has $ACTUAL but release input is ${{ inputs.version }}"
            echo "Bump the version in pyproject.toml via a PR first, then re-run this workflow."
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      # Tag the real, already-merged main commit *before* anything else touches
      # the working tree — main's branch protection requires PRs for every
      # change, so the CHANGELOG step below can only ever land via a PR (see
      # that step), never a direct push. Tagging first guarantees the release
      # tag always points at what's actually on main, not at some local-only
      # commit that a later step attempted (and failed) to push.
      - name: Create git tag
        run: |
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      # main requires PRs for every change (no direct-push bypass), so this
      # can't commit straight to main. Open a PR instead — merge it manually
      # (or have an agent merge it) after the release; the CHANGELOG update
      # is documentation, not part of the release artifacts themselves.
      - name: Open CHANGELOG PR with git-cliff
        run: |
          pip install git-cliff --quiet
          git cliff --tag "v${{ inputs.version }}" --unreleased --prepend CHANGELOG.md
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG already up to date, nothing to PR"
            exit 0
          fi
          BRANCH="chore/changelog-v${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git commit -m "docs: update CHANGELOG for v${{ inputs.version }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: update CHANGELOG for v${{ inputs.version }}" \
            --body "Auto-generated by the Release workflow for v${{ inputs.version }}." \
            --base main \
            --head "$BRANCH"

      - name: Create GitHub Release
        run: |
          gh release create "v${{ inputs.version }}" \
            dist/* \
            --title "v${{ inputs.version }}" \
            --generate-notes

      - name: Publish to PyPI
        run: uv publish
